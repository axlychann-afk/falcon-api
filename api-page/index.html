<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axly-API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .loader { width: 28px; height: 28px; border: 2px solid #4a5568; border-top: 2px solid #e2e8f0; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="bg-gray-900 text-slate-300 font-sans min-h-screen">
    <main class="max-w-4xl mx-auto px-8 py-16">
        <div class="mb-8">
            <h1 class="text-3xl font-bold gradient-text">Axly-API</h1>
            <p class="text-slate-400 text-sm mt-2">Dokumentasi API Axly-API</p>
        </div>

        <div class="mb-4">
            <input type="text" id="searchInput" placeholder="Cari endpoint..." class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-indigo-500">
        </div>

        <div id="apiList" class="space-y-3"></div>
        <div id="noResults" class="text-center py-16 hidden">Tidak ada endpoint ditemukan.</div>

        <footer class="mt-12 text-center text-slate-500 text-xs">© 2025 AxlyDev</footer>
    </main>

    <script>
        let categoriesData = [];

        async function loadApis() {
            try {
                const res = await fetch('/assets/settings.json');
                const data = await res.json();
                categoriesData = data.categories;
                renderCategories();
            } catch(e) { document.getElementById('apiList').innerHTML = '<p class="text-red-500">Gagal load API</p>'; }
        }

        function renderCategories() {
            const container = document.getElementById('apiList');
            container.innerHTML = '';
            categoriesData.forEach((cat, ci) => {
                const div = document.createElement('div');
                div.className = 'border border-gray-700 rounded-lg overflow-hidden mb-4';
                div.innerHTML = `
                    <div class="bg-gray-800 px-4 py-3 cursor-pointer flex justify-between" onclick="toggleCategory(${ci})">
                        <span class="font-bold">${cat.name} (${cat.items.length})</span>
                        <span class="material-icons" id="cat-icon-${ci}">expand_more</span>
                    </div>
                    <div id="cat-${ci}" class="hidden bg-gray-900">
                        ${cat.items.map((item, ii) => renderItem(ci, ii, item)).join('')}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderItem(ci, ii, item) {
            const method = item.method || 'GET';
            const isPost = method === 'POST';
            const hasFile = item.params && Object.values(item.params).some(v => v?.type === 'file');
            return `
                <div class="border-t border-gray-700 api-item" data-name="${item.name}" data-path="${item.path}">
                    <div class="px-4 py-3 cursor-pointer hover:bg-gray-800 flex justify-between" onclick="toggleEndpoint(${ci}, ${ii})">
                        <div class="flex gap-3">
                            <span class="px-2 py-0.5 text-xs font-bold rounded ${method === 'GET' ? 'bg-green-600' : 'bg-blue-600'}">${method}</span>
                            <span class="font-mono text-sm">${item.path.split('?')[0]}</span>
                            <span class="text-xs text-gray-400">${item.name}</span>
                        </div>
                        <span class="material-icons" id="ep-icon-${ci}-${ii}">expand_more</span>
                    </div>
                    <div id="ep-${ci}-${ii}" class="hidden px-4 pb-4">
                        <p class="text-sm text-gray-400 mb-3">${item.desc}</p>
                        ${item.status === 'ready' ? renderForm(ci, ii, item, method, hasFile) : '<p class="text-yellow-400">Endpoint sedang error</p>'}
                        <div id="curl-${ci}-${ii}" class="mt-3 text-xs bg-gray-800 p-3 rounded-lg hidden">
                            <div class="text-gray-400 mb-1">cURL Command:</div>
                            <pre id="curl-text-${ci}-${ii}" class="text-green-400 font-mono whitespace-pre-wrap"></pre>
                        </div>
                        <div id="resp-${ci}-${ii}" class="hidden mt-4">
                            <div class="font-bold text-sm mb-2">📤 RESPONSE</div>
                            <div class="bg-gray-800 rounded-lg p-4 overflow-auto max-h-96">
                                <pre id="resp-text-${ci}-${ii}" class="text-xs text-green-400 font-mono"></pre>
                            </div>
                            <div class="mt-2 flex justify-end">
                                <button onclick="copyResponse(${ci}, ${ii})" class="text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded">📋 Copy</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderForm(ci, ii, item, method, hasFile) {
            const params = item.params || {};
            if (hasFile) {
                return `
                    <form id="form-${ci}-${ii}" enctype="multipart/form-data" onsubmit="execute(event, ${ci}, ${ii}, '${method}', '${item.path}')">
                        ${Object.keys(params).map(k => `
                            <div class="mb-3">
                                <label class="block text-sm mb-1">${k} <span class="text-red-400">*</span></label>
                                <input type="file" name="${k}" class="w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded-lg">
                            </div>
                        `).join('')}
                        <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg text-sm">Execute</button>
                        <button type="button" onclick="clearResponse(${ci}, ${ii})" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg text-sm ml-2">Clear</button>
                    </form>
                `;
            }
            return `
                <form id="form-${ci}-${ii}" onsubmit="execute(event, ${ci}, ${ii}, '${method}', '${item.path}')">
                    ${Object.keys(params).map(k => `
                        <div class="mb-3">
                            <label class="block text-sm mb-1">${k}</label>
                            <input type="text" name="${k}" class="w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded-lg" placeholder="${params[k]}">
                        </div>
                    `).join('')}
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg text-sm">Execute</button>
                    <button type="button" onclick="clearResponse(${ci}, ${ii})" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg text-sm ml-2">Clear</button>
                </form>
            `;
        }

        async function execute(event, ci, ii, method, basePath) {
            event.preventDefault();
            const form = document.getElementById(`form-${ci}-${ii}`);
            const formData = new FormData(form);
            const respDiv = document.getElementById(`resp-${ci}-${ii}`);
            const respText = document.getElementById(`resp-text-${ci}-${ii}`);
            const curlDiv = document.getElementById(`curl-${ci}-${ii}`);
            const curlText = document.getElementById(`curl-text-${ci}-${ii}`);
            
            respDiv.classList.remove('hidden');
            respText.innerHTML = '<div class="loader mx-auto"></div>';
            
            let url = basePath;
            let options = { method };
            
            if (method === 'GET') {
                const params = new URLSearchParams();
                for (let [k, v] of formData.entries()) if (v) params.append(k, v);
                url = basePath.split('?')[0] + '?' + params.toString();
                options = { method: 'GET' };
            } else {
                options.body = formData;
            }
            
            // Generate cURL
            let curlCmd = `curl -X ${method} "${url}"`;
            if (method === 'POST') {
                for (let [k, v] of formData.entries()) {
                    if (v instanceof File) curlCmd += ` \\\n  -F "${k}=@${v.name}"`;
                    else if (v) curlCmd += ` \\\n  -F "${k}=${v}"`;
                }
            }
            curlText.innerText = curlCmd;
            curlDiv.classList.remove('hidden');
            
            try {
                const res = await fetch(url, options);
                const contentType = res.headers.get('content-type');
                if (contentType?.includes('application/json')) {
                    const json = await res.json();
                    respText.innerText = JSON.stringify(json, null, 2);
                } else if (contentType?.startsWith('image/')) {
                    const blob = await res.blob();
                    const imgUrl = URL.createObjectURL(blob);
                    respText.innerHTML = `<img src="${imgUrl}" class="max-w-full rounded-lg">`;
                } else {
                    respText.innerText = await res.text();
                }
            } catch (err) {
                respText.innerText = `Error: ${err.message}`;
            }
        }
        
        function clearResponse(ci, ii) {
            document.getElementById(`resp-${ci}-${ii}`)?.classList.add('hidden');
            document.getElementById(`curl-${ci}-${ii}`)?.classList.add('hidden');
        }
        
        function copyResponse(ci, ii) {
            const text = document.getElementById(`resp-text-${ci}-${ii}`)?.innerText;
            if (text) navigator.clipboard.writeText(text).then(() => alert('✅ Disalin!'));
            else alert('Tidak ada response');
        }
        
        function toggleCategory(ci) {
            const el = document.getElementById(`cat-${ci}`);
            const icon = document.getElementById(`cat-icon-${ci}`);
            el.classList.toggle('hidden');
            icon.innerText = el.classList.contains('hidden') ? 'expand_more' : 'expand_less';
        }
        
        function toggleEndpoint(ci, ii) {
            const el = document.getElementById(`ep-${ci}-${ii}`);
            const icon = document.getElementById(`ep-icon-${ci}-${ii}`);
            el.classList.toggle('hidden');
            icon.innerText = el.classList.contains('hidden') ? 'expand_more' : 'expand_less';
        }
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.api-item').forEach(el => {
                const name = el.dataset.name?.toLowerCase() || '';
                const path = el.dataset.path?.toLowerCase() || '';
                el.style.display = (name.includes(term) || path.includes(term)) ? '' : 'none';
            });
        });
        
        loadApis();
    </script>
</body>
</html>
