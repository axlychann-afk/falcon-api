<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse through our collection of code snippets, scripts, and tools. Find what you need or discover something new.">
    <meta name="theme-color" content="#1a202c">
    <title>Axly-API</title>
    <link rel="icon" href="/assets/icon.png" type="image/jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        'mono': ['Ubuntu Mono', 'monospace'],
                        'sans': ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { display: none !important; }
        .glass { backdrop-filter: blur(16px) saturate(180%); background: rgba(23, 25, 35, 0.85); border: 1px solid rgba(255, 255, 255, 0.125); }
        .loader { width: 28px; height: 28px; border: 2px solid #4a5568; border-top: 2px solid #e2e8f0; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .btn-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-1px); box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4); }
    </style>
</head>
<body class="bg-gray-900 text-slate-300 antialiased font-mono min-h-screen">
    <main class="max-w-2xl mx-auto px-8 py-16">
        <div class="text-left mb-8">
            <div class="flex items-center gap-4 mb-4">
                <img src="/assets/icon.png" class="w-12 md:w-9">
                <h1 class="text-3xl md:text-4xl font-bold gradient-text">Axly-API</h1>
            </div>
            <p class="text-slate-400 text-xs mx-auto mb-4">Selamat datang di dokumentasi Axly-API. Antarmuka interaktif ini memungkinkan Anda menjelajahi dan menguji koleksi lengkap titik akhir API kami secara real-time.</p>
            <div class="mb-4 text-xs space-y-1">
                <div><a href="https://t.me/AxlyChann" target="_blank" class="text-slate-300 hover:text-white underline">Contact AxlyDev</a></div>
            </div>
        </div>

        <div class="flex items-center justify-between mb-4">
            <div class="flex-1 relative">
                <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                    <span class="material-icons text-gray-500 text-lg">search</span>
                </div>
                <input type="text" id="searchInput" placeholder="Search API endpoints..." class="w-full pl-12 pr-5 py-4 text-sm border border-gray-700 bg-gray-800 text-slate-300 placeholder-slate-500 focus:outline-none focus:border-indigo-500">
            </div>
        </div>

        <div id="content" class="space-y-4">
            <div id="noResults" class="text-center py-16" style="display: none;">
                <div class="max-w-md mx-auto"><h3 class="text-xs text-slate-400 mb-2">No result found.</h3></div>
            </div>
            <div id="apiList" class="space-y-3"></div>
        </div>
        <footer><p class="text-slate-400 text-xs mx-auto mb-4">2025 AxlyDev</p></footer>
    </main>

    <script>
        function toggleCategory(index) {
            const category = document.getElementById(`category-${index}`);
            const icon = document.getElementById(`category-icon-${index}`);
            if (category.classList.contains('hidden')) {
                category.classList.remove('hidden');
                icon.textContent = 'expand_less';
            } else {
                category.classList.add('hidden');
                icon.textContent = 'expand_more';
            }
        }

        function toggleEndpoint(catIndex, endpointIndex) {
            const endpoint = document.getElementById(`endpoint-${catIndex}-${endpointIndex}`);
            const icon = document.getElementById(`endpoint-icon-${catIndex}-${endpointIndex}`);
            if (endpoint.classList.contains('hidden')) {
                endpoint.classList.remove('hidden');
                icon.textContent = 'expand_less';
            } else {
                endpoint.classList.add('hidden');
                icon.textContent = 'expand_more';
            }
        }

        function generateCurlCommand(method, url, formData) {
            let curl = `curl -X ${method} "${url}"`;
            if (method === 'POST') {
                for (let [key, value] of formData.entries()) {
                    if (value instanceof File) {
                        curl += ` \\\n  -F "${key}=@${value.name}"`;
                    } else if (value) {
                        curl += ` \\\n  -F "${key}=${value}"`;
                    }
                }
            }
            return curl;
        }

        async function executeRequest(event, catIndex, endpointIndex, method, path, produces) {
            event.preventDefault();
            const form = document.getElementById(`form-${catIndex}-${endpointIndex}`);
            const responseDiv = document.getElementById(`response-${catIndex}-${endpointIndex}`);
            const responseContent = document.getElementById(`response-content-${catIndex}-${endpointIndex}`);
            const clearButton = document.getElementById(`clear-${catIndex}-${endpointIndex}`);
            const curlDiv = document.getElementById(`curl-${catIndex}-${endpointIndex}`);
            const curlContent = document.getElementById(`curl-content-${catIndex}-${endpointIndex}`);
            
            const formData = new FormData(form);
            const params = new URLSearchParams();
            let fullPath = path;
            let options = { method: method };

            if (method === 'GET') {
                for (const [key, value] of formData.entries()) {
                    if (value) params.append(key, value);
                }
                fullPath = `${path}?${params.toString()}`;
            } else {
                options.body = formData;
            }

            responseDiv.classList.remove('hidden');
            responseContent.innerHTML = '<div class="loader"></div>';
            
            // Generate dan tampilkan cURL command
            const curlCommand = generateCurlCommand(method, fullPath, formData);
            if (curlDiv && curlContent) {
                curlContent.innerText = curlCommand;
                curlDiv.classList.remove('hidden');
            }

            try {
                const response = await fetch(fullPath, options);
                const contentType = response.headers.get("content-type");
                if (contentType && contentType.includes("application/json")) {
                    const data = await response.json();
                    responseContent.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else if (contentType && contentType.startsWith("image/")) {
                    const blob = await response.blob();
                    const imageUrl = URL.createObjectURL(blob);
                    responseContent.innerHTML = `<img src="${imageUrl}" class="max-w-full h-auto rounded-md">`;
                } else {
                    const text = await response.text();
                    responseContent.innerHTML = `<pre>${text}</pre>`;
                }
            } catch (error) {
                responseContent.innerHTML = `<pre>${error}</pre>`;
            }
            clearButton.classList.remove('hidden');
        }

        function clearResponse(catIndex, endpointIndex) {
            const responseDiv = document.getElementById(`response-${catIndex}-${endpointIndex}`);
            const responseContent = document.getElementById(`response-content-${catIndex}-${endpointIndex}`);
            const clearButton = document.getElementById(`clear-${catIndex}-${endpointIndex}`);
            const curlDiv = document.getElementById(`curl-${catIndex}-${endpointIndex}`);
            responseContent.innerHTML = '';
            responseDiv.classList.add('hidden');
            clearButton.classList.add('hidden');
            if (curlDiv) curlDiv.classList.add('hidden');
        }

        async function loadApis() {
            const apiList = document.getElementById('apiList');
            try {
                const response = await fetch('/assets/settings.json');
                const data = await response.json();
                let html = '';
                data.categories.forEach((category, catIndex) => {
                    html += `<div class="category-group" data-category="${category.name}">
                        <div class="mb-2">
                            <div class="bg-gray-800 border border-gray-700">
                                <button onclick="toggleCategory(${catIndex})" class="w-full px-4 py-3 text-left flex items-center justify-between hover:bg-gray-700 transition-colors duration-150">
                                    <h2 class="font-bold flex items-center"><span class="material-icons text-lg mr-3 text-gray-400">folder</span><span class="truncate max-w-xs text-sm">${category.name}</span><span class="ml-2 text-xs text-gray-500">(${category.items.length})</span></h2>
                                    <span class="material-icons transition-transform duration-150" id="category-icon-${catIndex}">expand_more</span>
                                </button>
                                <div id="category-${catIndex}" class="hidden">`;
                    category.items.forEach((item, endpointIndex) => {
                        const method = 'GET';
                        const pathParts = item.path.split('?');
                        const path = pathParts[0];
                        const statusClasses = { 'ready': 'bg-green-500/20 text-green-400', 'update': 'bg-yellow-500/20 text-yellow-400', 'error': 'bg-red-500/20 text-red-400' };
                        const statusClass = statusClasses[item.status] || 'bg-gray-600';
                        html += `<div class="border-t border-gray-700 api-item" data-method="${method}" data-path="${path}" data-alias="${item.name}" data-description="${item.desc}" data-category="${category.name}">
                            <button onclick="toggleEndpoint(${catIndex}, ${endpointIndex})" class="w-full px-4 py-3 text-left flex items-center justify-between hover:bg-gray-700 transition-colors duration-150">
                                <div class="flex items-center min-w-0 flex-1"><span class="inline-block px-3 py-1 text-xs font-semibold text-white mr-3 flex-shrink-0 bg-gray-600">${method}</span>
                                <div class="flex flex-col min-w-0 flex-1"><span class="font-semibold truncate max-w-[90%] font-mono text-sm" title="${path}">${path}</span>
                                <div class="flex items-center"><span class="text-xs text-gray-400 truncate max-w-[90%]" title="${item.name}">${item.name}</span><span class="ml-2 px-2 py-0.5 text-xs rounded-full ${statusClass}">${item.status || 'ready'}</span></div></div></div>
                                <span class="material-icons transition-transform duration-150 flex-shrink-0" id="endpoint-icon-${catIndex}-${endpointIndex}">expand_more</span>
                            </button>
                            <div id="endpoint-${catIndex}-${endpointIndex}" class="hidden bg-gray-800 p-4 border-t border-gray-700">
                                <div class="mb-3"><div class="text-gray-400 text-xs">${item.desc}</div></div>`;
                        if (item.status === 'ready') {
                            html += `<div><div class="text-gray-300 font-bold text-xs mb-2 flex items-center"><span class="material-icons text-sm mr-1">play_arrow</span>TRY IT OUT</div>
                                <div><form id="form-${catIndex}-${endpointIndex}" onsubmit="executeRequest(event, ${catIndex}, ${endpointIndex}, '${method}', '${path}', 'application/json')">
                                    <div class="mb-4 space-y-2">`;
                            if (item.params) {
                                Object.keys(item.params).forEach(paramName => {
                                    const isRequired = true;
                                    html += `<div><label class="block text-xs font-medium text-slate-400 mb-2">${paramName} ${isRequired ? '<span class="text-red-500">*</span>' : ''}</label>
                                        <input type="text" name="${paramName}" class="w-full px-3 py-2 border border-gray-600 text-sm focus:outline-none focus:border-indigo-500 bg-gray-700 placeholder:text-slate-500" placeholder="${item.params[paramName]}" ${isRequired ? 'required' : ''}></div>`;
                                });
                            }
                            html += `</div><button type="submit" class="bg-indigo-600 hover:bg-indigo-500 font-semibold text-white px-6 py-2 text-xs font-medium transition-colors duration-150">Execute</button>
                                <button type="button" id="clear-${catIndex}-${endpointIndex}" onclick="clearResponse(${catIndex}, ${endpointIndex})" class="hidden bg-gray-700 border border-gray-600 hover:border-gray-500 font-semibold text-slate-300 px-6 py-2 text-xs font-medium transition-colors duration-150 ml-2">Clear</button>
                                </form></div></div>`;
                        } else {
                            html += `<div class="text-yellow-400 text-xs p-3 bg-yellow-500/20 border border-yellow-500/30">Endpoint ini tidak dapat diuji coba saat ini.</div>`;
                        }
                        // Tambahin cURL command dan HTTPS URL
                        html += `<div id="curl-${catIndex}-${endpointIndex}" class="hidden mt-4 text-xs bg-gray-700 p-3 rounded-lg">
                                    <span class="text-gray-300">🔧 cURL Command:</span>
                                    <pre id="curl-content-${catIndex}-${endpointIndex}" class="text-green-400 font-mono mt-1 whitespace-pre-wrap"></pre>
                                </div>
                                <div class="mt-2 text-xs bg-gray-700 p-3 rounded-lg">
                                    <span class="text-gray-300">🌐 HTTPS URL:</span>
                                    <a href="${window.location.origin}${path}" target="_blank" class="text-blue-400 hover:underline ml-2 break-all">${window.location.origin}${path}</a>
                                </div>
                                <div id="response-${catIndex}-${endpointIndex}" class="hidden mt-4">
                                    <div class="text-gray-300 font-bold text-xs mb-2 flex items-center"><span class="material-icons text-sm mr-1">code</span>RESPONSE</div>
                                    <div class="bg-gray-900 text-white text-xs p-4 border border-gray-700"><div class="max-h-80 overflow-auto" id="response-content-${catIndex}-${endpointIndex}"></div></div>
                                </div>
                            </div></div>`;
                    });
                    html += `</div></div></div>`;
                });
                apiList.innerHTML = html;
            } catch (error) {
                apiList.innerHTML = '<p class="text-red-500">Failed to load API data.</p>';
                console.error('Error loading API data:', error);
            }
        }

        document.getElementById('searchInput').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const apiItems = document.querySelectorAll('.api-item');
            const categories = document.querySelectorAll('.category-group');
            const noResults = document.getElementById('noResults');
            let visibleCount = 0;
            apiItems.forEach(item => {
                const path = item.dataset.path.toLowerCase();
                const alias = item.dataset.alias.toLowerCase();
                const description = item.dataset.description.toLowerCase();
                if (path.includes(searchTerm) || alias.includes(searchTerm) || description.includes(searchTerm)) {
                    item.style.display = '';
                    visibleCount++;
                } else {
                    item.style.display = 'none';
                }
            });
            categories.forEach(category => {
                const visibleItems = category.querySelectorAll('.api-item[style=""]');
                if (visibleItems.length > 0) { category.style.display = ''; } 
                else { category.style.display = 'none'; }
            });
            if (visibleCount === 0) { noResults.style.display = 'block'; } 
            else { noResults.style.display = 'none'; }
        });

        document.addEventListener('DOMContentLoaded', () => { loadApis(); });
    </script>
</body>
</html>
